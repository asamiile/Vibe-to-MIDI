name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto-detect bump type and release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Skip if version bump commit
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$COMMIT_MSG" | grep -q "^chore: bump version to v"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect bump type from conventional commits
        if: steps.check.outputs.skip == 'false'
        id: detect
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          fi

          BUMP_TYPE="patch"
          if echo "$COMMITS" | grep -qE "^(\w+)(\(.+\))?!:|^BREAKING CHANGE:"; then
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP_TYPE="minor"
          fi

          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "Detected: $BUMP_TYPE"
          echo "--- commits since last tag ---"
          echo "$COMMITS"

      - name: Bump version
        if: steps.check.outputs.skip == 'false'
        id: bump
        run: |
          CURRENT_VERSION=$(jq -r '.expo.version' app.json)
          CURRENT_VERSION_CODE=$(jq -r '.expo.android.versionCode' app.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "${{ steps.detect.outputs.bump_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))

          jq --arg v "$NEW_VERSION" --argjson vc "$NEW_VERSION_CODE" --arg bn "$NEW_VERSION_CODE" \
            '.expo.version = $v | .expo.android.versionCode = $vc | .expo.ios.buildNumber = $bn' \
            app.json > app.json.tmp && mv app.json.tmp app.json

          jq --arg v "$NEW_VERSION" '.version = $v' \
            package.json > package.json.tmp && mv package.json.tmp package.json

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version_code=$NEW_VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT_VERSION -> $NEW_VERSION (versionCode: $CURRENT_VERSION_CODE -> $NEW_VERSION_CODE)"

      - name: Commit and tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git add app.json package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --generate-notes \
            --repo "${{ github.repository }}"
