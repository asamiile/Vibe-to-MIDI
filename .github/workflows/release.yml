name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Bump version and create release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          CURRENT_VERSION=$(jq -r '.expo.version' app.json)
          CURRENT_VERSION_CODE=$(jq -r '.expo.android.versionCode' app.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "${{ inputs.bump_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))

          jq --arg v "$NEW_VERSION" --argjson vc "$NEW_VERSION_CODE" --arg bn "$NEW_VERSION_CODE" \
            '.expo.version = $v | .expo.android.versionCode = $vc | .expo.ios.buildNumber = $bn' \
            app.json > app.json.tmp && mv app.json.tmp app.json

          # Update package.json version to match
          jq --arg v "$NEW_VERSION" '.version = $v' \
            package.json > package.json.tmp && mv package.json.tmp package.json

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version_code=$NEW_VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT_VERSION -> $NEW_VERSION (versionCode: $CURRENT_VERSION_CODE -> $NEW_VERSION_CODE)"

      - name: Commit and tag
        run: |
          git add app.json package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --generate-notes \
            --repo "${{ github.repository }}"
